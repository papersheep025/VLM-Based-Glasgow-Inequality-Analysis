# Route A — frozen text encoder + regression heads (BGE-m3)
# Consumed by `python -m decision.train.cv_runner --config <this file>`.
# CLI flags override YAML values.

dataset: outputs/decision/dataset_v0.jsonl
out_dir: outputs/decision/route_a/bge_m3_v0

encoder:
  name: BAAI/bge-m3
  batch_size: 32

cv:
  n_splits: 5

train:
  d_poi: 32
  d_trunk: 256
  head_hidden: 64
  dropout: 0.2

  lr: 2.0e-4
  weight_decay: 1.0e-4
  epochs: 60
  batch_size: 64
  grad_clip: 1.0

  # composite head loss = Huber + lam_pearson * (1 - Pearson) + lam_spearman * SoftSpearman
  huber_beta: 1.0
  lam_pearson: 0.5
  lam_spearman: 0.5
  soft_beta: 5.0

  patience: 10
  seed: 42
  device: null   # null → auto (cuda > mps > cpu)
