# Route C ceiling experiment — all structural improvements stacked.
# Adds ego-gap, SAR target-lag, and DZ-level aggregation on top of the
# current best (sbert_spatial_poi_v0).

dataset: outputs/decision/dataset_v0.jsonl
out_dir: outputs/decision/route_c/sbert_ceiling_v0

caption:
  mode: concat

encoder:
  backend: sbert
  name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32
  max_length: 256

cv:
  n_splits: 5

train:
  regressor: ridge_cv
  use_poi_vec: true
  use_spatial_lag: true
  use_ego_gap: true       # append X_self − X_nbr_mean (same dim as embedding)
  use_sar_lag: true       # append mean(y_train_neighbors) per domain (7-dim)
  use_dz_agg: true        # mean-pool duplicate samples before building dz_index
  seed: 42
