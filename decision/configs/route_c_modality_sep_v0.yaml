# Route C modality-separated encoding experiment.
# Fixes the 256-token truncation bug: sat / ntl / sv / poi are encoded
# independently (sv via per-phrase mean-pooling) and concatenated → 1536-dim.
# All other settings match sbert_ceiling_v0.

dataset: outputs/decision/dataset_v0.jsonl
out_dir: outputs/decision/route_c/modality_sep_v0

caption:
  mode: modality_sep

encoder:
  backend: sbert
  name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32
  max_length: 256

cv:
  n_splits: 5

train:
  regressor: ridge_cv
  use_poi_vec: true
  use_spatial_lag: true
  use_ego_gap: true
  use_sar_lag: true
  use_dz_agg: true
  seed: 42
