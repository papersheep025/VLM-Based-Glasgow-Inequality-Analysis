# Route B — LLM-as-regressor with CoT, fine-tuned via PEFT LoRA on remote host.
# Two-stage pipeline:
#   1. rationalizer.py  — teacher CoT generated from ground-truth + evidence
#                         via the remote LLM (cite-only substring validation).
#   2. train_sft.py     — SFT on (evidence prompt → teacher CoT + JSON scores).

dataset: outputs/decision/dataset_v0.jsonl
perception: outputs/perception/qwen3vl_8b_perception.jsonl
out_dir: outputs/decision/route_b/qwen3_llm_sft_v0

# ------------------------------------------------------------------
# Remote LLM backend (used by both rationalizer and SFT/inference).
# Values read via env in utils/remote.py — listed here for reference.
#
# For rationalisation (base model, no adapter):
#   backend: openai_compat   →  vllm serve models/Qwen3-8B
#
# For inference after SFT (two options):
#   Option A — vLLM LoRA serving (recommended for remote host):
#     vllm serve models/Qwen3-8B \
#       --enable-lora \
#       --lora-modules sft=<adapter_dir>
#     Then set model: sft  (the lora-module alias)
#
#   Option B — local_hf backend with adapter_path:
#     backend: local_hf
#     adapter_path: outputs/decision/route_b/lora_adapter_v0
# ------------------------------------------------------------------
remote:
  backend: local_hf
#  backend: openai_compat          # openai_compat | vllm_http | local_hf
  base_url: http://127.0.0.1:8000/v1
  model: models/Qwen3-8B            # for vLLM LoRA inference, set to the lora-module alias (e.g. sft)
  api_key_env: ROUTE_B_API_KEY    # optional; empty = no auth
  timeout_s: 120
  max_retries: 3
  adapter_path: "outputs/decision/route_b/lora_adapter_v0"                # used only by local_hf backend; path to PEFT adapter dir

# ------------------------------------------------------------------
# Stage 1 — teacher CoT rationalisation
# ------------------------------------------------------------------
rationalize:
  split: train
  out_path: outputs/decision/route_b/rationales_v0.jsonl
  temperature: 0.3
  max_tokens: 2048
  cite_only: true                  # each evidence phrase must appear verbatim in input
  min_cite_pass_rate: 0.80
  spot_check_n: 50                 # manual review sample count

# ------------------------------------------------------------------
# Stage 2 — PEFT LoRA SFT (runs on remote GPU)
# ------------------------------------------------------------------
sft:
  base_model: models/Qwen3-8B
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]
  train:
    epochs: 3
    batch_size: 1
    gradient_accumulation: 16
    lr: 1.0e-4
    warmup_ratio: 0.03
    max_seq_len: 2048
    seed: 42
  output_adapter_dir: outputs/decision/route_b/lora_adapter_v0

# ------------------------------------------------------------------
# Stage 3 — inference
# ------------------------------------------------------------------
infer:
  adapter_dir: outputs/decision/route_b/lora_adapter_v0
  out_path: outputs/decision/route_b/predictions_v0.jsonl
  temperature: 0.0
  max_tokens: 2048
  fallback: train_mean             # if JSON parse fails → per-domain train-set mean
