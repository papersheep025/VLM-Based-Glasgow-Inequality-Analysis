# Route C — Caption embedding + linear regression (CityLens-style baseline).
# Consumed by `python -m decision.train.cv_runner_caption --config <this file>`.
# CLI flags override YAML values.

dataset: outputs/decision/dataset_v0.jsonl
out_dir: outputs/decision/route_c/sbert_minilm_v0

caption:
  mode: concat                # concat | templated

encoder:
  backend: sbert              # bert | sbert
  name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32
  max_length: 256

cv:
  n_splits: 5

train:
  regressor: ridge_cv         # ridge_cv | lasso_cv | elasticnet_cv
  use_poi_vec: false
  use_spatial_lag: false      # true: concat mean-neighbour embedding (Queen contiguity)
  seed: 42
