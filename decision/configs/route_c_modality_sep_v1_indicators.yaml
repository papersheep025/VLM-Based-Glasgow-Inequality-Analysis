# v1 baseline + use_domain_indicators: true
# Tests whether the 17-dim Likert indicators newly populated in v2 perception
# bring any uplift, isolated from the SVF segmentation branch.

dataset: outputs/decision/dataset_v1.jsonl
out_dir: outputs/decision/route_c/modality_sep_v1_indicators

caption:
  mode: modality_sep

encoder:
  backend: sbert
  name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32
  max_length: 256

cv:
  n_splits: 5

train:
  regressor: ridge_cv
  use_poi_vec: true
  use_spatial_lag: true
  use_ego_gap: true
  use_sar_lag: true
  use_dz_agg: true
  use_domain_indicators: true   # ← only diff vs route_c_modality_sep_v1.yaml
  seed: 42
