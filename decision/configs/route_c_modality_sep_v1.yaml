# Route C modality_sep baseline rebuilt on dataset_v1.jsonl
# (v2 perception with domain_indicators populated; modeling unchanged from v0).

dataset: outputs/decision/dataset_v1.jsonl
out_dir: outputs/decision/route_c/modality_sep_v1

caption:
  mode: modality_sep

encoder:
  backend: sbert
  name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32
  max_length: 256

cv:
  n_splits: 5

train:
  regressor: ridge_cv
  use_poi_vec: true
  use_spatial_lag: true
  use_ego_gap: true
  use_sar_lag: true
  use_dz_agg: true
  seed: 42
