# VLM/POI-only Route C diagnostic.
# Disables spatial embedding lag, ego-gap, and SAR lag; keeps modality_sep SBERT
# and POI vector. This estimates non-spatial visual/text signal under the same
# IZ-grouped folds.

dataset: outputs/decision/dataset_v1.jsonl
out_dir: outputs/decision/route_c/diagnostics_no_spatial_no_sar_v1

caption:
  mode: modality_sep

encoder:
  backend: sbert
  name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32
  max_length: 256

cv:
  n_splits: 5

train:
  regressor: ridge_cv
  use_poi_vec: true
  use_spatial_lag: false
  use_ego_gap: false
  use_sar_lag: false
  use_dz_agg: true
  seed: 42
