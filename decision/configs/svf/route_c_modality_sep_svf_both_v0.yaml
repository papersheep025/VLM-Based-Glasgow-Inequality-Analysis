# Route C modality_sep_v0 baseline + SegFormer-B2 + MIT ResNet18-dilated
# SVF features, concatenated (15 + 15 = 30 dims; 60 with mean+std).

dataset: outputs/decision/dataset_v1.jsonl
out_dir: outputs/decision/route_c/modality_sep_svf_both_v1

caption:
  mode: modality_sep

encoder:
  backend: sbert
  name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32
  max_length: 256

cv:
  n_splits: 5

train:
  regressor: ridge_cv
  use_poi_vec: true
  use_spatial_lag: true
  use_ego_gap: true
  use_sar_lag: true
  use_dz_agg: true
  seed: 42

svf:
  parquets:
    - outputs/perception/svf/datazone_svf_segformer.parquet
    - outputs/perception/svf/datazone_svf_mitpsp.parquet
  columns: [mean, std]  # 2 models × (15 mean + 15 std) = 60 dims
