<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B4351"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#2F3542" flood-opacity="0.14"/>
    </filter>
    <style><![CDATA[
      .title{font-family:Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;font-size:38px;font-weight:800;fill:#232B36;}
      .subtitle{font-family:Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;font-size:18px;font-weight:500;fill:#657080;}
      .section{font-family:Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;font-size:24px;font-weight:800;fill:#232B36;}
      .h{font-family:Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;font-size:19px;font-weight:800;fill:#222A35;}
      .t{font-family:Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;font-size:15px;font-weight:500;fill:#303846;}
      .s{font-family:Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;font-size:13px;font-weight:500;fill:#566173;}
      .tiny{font-family:Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;font-size:12px;font-weight:500;fill:#687386;}
      .tag{font-family:Arial, 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;font-size:13px;font-weight:800;fill:#3A4150;}
      .box{rx:20;ry:20;stroke:#3B4351;stroke-width:1.6;filter:url(#shadow);}
      .smallbox{rx:16;ry:16;stroke:#3B4351;stroke-width:1.4;filter:url(#shadow);}
      .line{fill:none;stroke:#3B4351;stroke-width:2.1;marker-end:url(#arrow);}
      .thin{fill:none;stroke:#687386;stroke-width:1.6;marker-end:url(#arrow);}
      .dash{fill:none;stroke:#687386;stroke-width:1.7;stroke-dasharray:7 6;marker-end:url(#arrow);}
      .panel{rx:28;ry:28;fill:#FFFFFF;stroke:#CBD3DF;stroke-width:1.4;filter:url(#shadow);}
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1800" height="1180" fill="#FAFBFD"/>
  <text x="900" y="58" text-anchor="middle" class="title">Glasgow Multi-modal Urban Inequality Framework</text>
  <text x="900" y="88" text-anchor="middle" class="subtitle">Data preparation → VLM perception → SVF segmentation branch → spatially-aware decision layer → SIMD domain prediction</text>

  <!-- Top panels -->
  <rect x="55" y="120" width="520" height="420" class="panel"/>
  <rect x="640" y="120" width="520" height="420" class="panel"/>
  <rect x="1225" y="120" width="520" height="420" class="panel"/>

  <text x="315" y="158" text-anchor="middle" class="section">1. 数据准备与预处理</text>
  <text x="900" y="158" text-anchor="middle" class="section">2. 感知层主线</text>
  <text x="1485" y="158" text-anchor="middle" class="section">3. SVF 语义分割分支</text>

  <!-- Data prep -->
  <rect x="95" y="185" width="440" height="135" class="box" fill="#FCE5D6"/>
  <text x="315" y="213" text-anchor="middle" class="h">External / Raw Inputs</text>
  <text x="120" y="242" class="t">• Glasgow datazone shapefile, 746 zones</text>
  <text x="120" y="266" class="t">• Satellite / Nightlight GeoTIFF</text>
  <text x="120" y="290" class="t">• Mapillary / Google Street View API</text>
  <text x="120" y="314" class="t">• OSM / Google Places API + SIMD 2020 CSV</text>

  <line x1="315" y1="320" x2="315" y2="354" class="line"/>
  <rect x="82" y="360" width="135" height="84" class="smallbox" fill="#DFEBF7"/>
  <rect x="248" y="360" width="135" height="84" class="smallbox" fill="#DFEBF7"/>
  <rect x="414" y="360" width="135" height="84" class="smallbox" fill="#DFEBF7"/>
  <text x="149" y="388" text-anchor="middle" class="h">A. Patch</text>
  <text x="149" y="414" text-anchor="middle" class="s">TIFF → PNG</text>
  <text x="149" y="435" text-anchor="middle" class="tiny">sat / ntl patches</text>
  <text x="315" y="388" text-anchor="middle" class="h">B. Street View</text>
  <text x="315" y="414" text-anchor="middle" class="s">API → JPG</text>
  <text x="315" y="435" text-anchor="middle" class="tiny">aligned by datazone</text>
  <text x="481" y="388" text-anchor="middle" class="h">C. POI</text>
  <text x="481" y="414" text-anchor="middle" class="s">API → CSV</text>
  <text x="481" y="435" text-anchor="middle" class="tiny">osm_poi / poi_dataset</text>

  <line x1="149" y1="444" x2="149" y2="465" class="thin"/>
  <line x1="315" y1="444" x2="315" y2="465" class="thin"/>
  <line x1="481" y1="444" x2="481" y2="465" class="thin"/>
  <rect x="120" y="470" width="390" height="48" class="smallbox" fill="#E2EFD9"/>
  <text x="315" y="499" text-anchor="middle" class="h">D. QA / Visualization</text>
  <text x="315" y="520" text-anchor="middle" class="tiny">Folium interactive map + coverage statistics → perception/</text>

  <!-- Main perception -->
  <rect x="700" y="185" width="400" height="75" class="box" fill="#FCE5D6"/>
  <text x="900" y="214" text-anchor="middle" class="h">Multi-modal Dataset</text>
  <text x="900" y="238" text-anchor="middle" class="t">streetview + satellite + nightlight + POI</text>

  <line x1="900" y1="260" x2="900" y2="294" class="line"/>
  <rect x="700" y="300" width="400" height="88" class="box" fill="#EDEEF7"/>
  <text x="900" y="330" text-anchor="middle" class="h">Qwen3-VL-8B Perception</text>
  <text x="900" y="355" text-anchor="middle" class="t">perception/infer/perceive_local.py</text>
  <text x="900" y="377" text-anchor="middle" class="s">evidence phrases + domain_indicators</text>

  <line x1="900" y1="388" x2="900" y2="420" class="line"/>
  <rect x="700" y="425" width="400" height="78" class="box" fill="#DFEBF7"/>
  <text x="900" y="455" text-anchor="middle" class="h">Build Decision Dataset</text>
  <text x="900" y="480" text-anchor="middle" class="t">decision/data/build_dataset.py → dataset_v1.jsonl</text>

  <!-- SVF branch -->
  <rect x="1285" y="185" width="400" height="75" class="box" fill="#FCE5D6"/>
  <text x="1485" y="214" text-anchor="middle" class="h">Raw Streetview Images</text>
  <text x="1485" y="238" text-anchor="middle" class="t">streetview_dataset/</text>
  <line x1="1485" y1="260" x2="1485" y2="294" class="line"/>
  <rect x="1285" y="300" width="400" height="88" class="box" fill="#FFF2CC"/>
  <text x="1485" y="330" text-anchor="middle" class="h">Semantic Segmentation</text>
  <text x="1485" y="355" text-anchor="middle" class="t">SegFormer-B2 / MIT PSP</text>
  <text x="1485" y="377" text-anchor="middle" class="s">image-level SVF parquet</text>
  <line x1="1485" y1="388" x2="1485" y2="420" class="line"/>
  <rect x="1285" y="425" width="400" height="78" class="box" fill="#E2EFD9"/>
  <text x="1485" y="455" text-anchor="middle" class="h">Datazone Aggregation</text>
  <text x="1485" y="480" text-anchor="middle" class="t">mean / std by DZ → SVF parquet</text>

  <!-- Cross arrows top to perception -->
  <path d="M510 494 C610 494,610 222,700 222" class="dash"/>
  <path d="M1100 464 C1180 464,1200 464,1285 464" class="dash"/>

  <!-- Decision layer panel -->
  <rect x="55" y="580" width="1690" height="500" class="panel"/>
  <text x="900" y="620" text-anchor="middle" class="section">4. 决策层：Modality-separated Encoding + Spatially-aware Regression</text>

  <!-- Decision boxes -->
  <rect x="95" y="665" width="205" height="95" class="box" fill="#DFEBF7"/>
  <text x="197" y="695" text-anchor="middle" class="h">[1] dataset_v0</text>
  <text x="197" y="720" text-anchor="middle" class="s">4 text fields</text>
  <text x="197" y="742" text-anchor="middle" class="s">sat / ntl / sv / poi_text</text>

  <rect x="355" y="665" width="270" height="120" class="box" fill="#EDEEF7"/>
  <text x="490" y="695" text-anchor="middle" class="h">[2] Modality-separated SBERT</text>
  <text x="490" y="721" text-anchor="middle" class="s">4 × 384-d → 1536-d embedding</text>
  <text x="490" y="744" text-anchor="middle" class="tiny">SAT / NTL: full encode</text>
  <text x="490" y="765" text-anchor="middle" class="tiny">SV: phrase encode + mean-pool</text>

  <rect x="680" y="665" width="240" height="95" class="box" fill="#E2EFD9"/>
  <text x="800" y="695" text-anchor="middle" class="h">[3] DZ Aggregation</text>
  <text x="800" y="721" text-anchor="middle" class="s">multi-image → unique DZ</text>
  <text x="800" y="743" text-anchor="middle" class="s">mean-pool fixes duplicate DZ</text>

  <rect x="970" y="665" width="270" height="120" class="box" fill="#FFF2CC"/>
  <text x="1105" y="695" text-anchor="middle" class="h">[3.5] SVF Feature Injection</text>
  <text x="1105" y="721" text-anchor="middle" class="s">segmentation category ratios</text>
  <text x="1105" y="744" text-anchor="middle" class="s">mean / std per datazone</text>
  <text x="1105" y="766" text-anchor="middle" class="tiny">train-only imputation, no val leakage</text>

  <rect x="1295" y="665" width="345" height="120" class="box" fill="#FCE5D6"/>
  <text x="1467" y="695" text-anchor="middle" class="h">[4] Spatial Feature Fusion</text>
  <text x="1467" y="721" text-anchor="middle" class="s">spatial lag: self + neighbor_mean</text>
  <text x="1467" y="744" text-anchor="middle" class="s">ego-gap: self − neighbor_mean</text>
  <text x="1467" y="766" text-anchor="middle" class="s">POI vector + SAR target lag, 7-dim</text>

  <line x1="300" y1="712" x2="354" y2="712" class="line"/>
  <line x1="625" y1="712" x2="679" y2="712" class="line"/>
  <line x1="920" y1="712" x2="969" y2="712" class="line"/>
  <line x1="1240" y1="712" x2="1294" y2="712" class="line"/>

  <!-- Lower model comparison -->
  <rect x="270" y="850" width="315" height="120" class="smallbox" fill="#FFFFFF"/>
  <text x="428" y="881" text-anchor="middle" class="h">Ablation Suite</text>
  <text x="428" y="908" text-anchor="middle" class="s">RidgeCV baseline / indicators</text>
  <text x="428" y="931" text-anchor="middle" class="s">SegFormer / MIT PSP SVF</text>
  <text x="428" y="954" text-anchor="middle" class="s">HGB / PCA-HGB / stacking</text>

  <rect x="725" y="842" width="350" height="136" class="box" fill="#EDEEF7"/>
  <text x="900" y="875" text-anchor="middle" class="h">[5] RidgeCV × 7 Domains</text>
  <text x="900" y="902" text-anchor="middle" class="s">StandardScaler → clip(±30)</text>
  <text x="900" y="925" text-anchor="middle" class="s">RidgeCV(cv=5, 25 alphas)</text>
  <text x="900" y="948" text-anchor="middle" class="s">Income / Employment / Health / Education</text>
  <text x="900" y="970" text-anchor="middle" class="s">Access / Crime / Housing</text>

  <rect x="1215" y="850" width="315" height="120" class="smallbox" fill="#DFEBF7"/>
  <text x="1372" y="881" text-anchor="middle" class="h">Outputs</text>
  <text x="1372" y="908" text-anchor="middle" class="s">outputs/decision/route_c/*</text>
  <text x="1372" y="931" text-anchor="middle" class="s">oof_predictions.jsonl</text>
  <text x="1372" y="954" text-anchor="middle" class="s">cv_summary.json</text>

  <path d="M1467 785 C1467 820,900 820,900 841" class="line"/>
  <path d="M1105 785 C1105 810,900 810,900 841" class="thin"/>
  <path d="M900 503 C900 555,197 555,197 664" class="line"/>
  <path d="M1485 503 C1485 570,1105 570,1105 664" class="line"/>
  <line x1="585" y1="910" x2="724" y2="910" class="dash"/>
  <line x1="1075" y1="910" x2="1214" y2="910" class="line"/>

  <!-- Footer ribbon -->
  <rect x="390" y="1022" width="1020" height="36" rx="18" ry="18" fill="#232B36" opacity="0.92"/>
  <text x="900" y="1046" text-anchor="middle" style="font-family:Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;font-size:15px;font-weight:700;fill:#FFFFFF;">Leakage-safe per-fold fitting · Datazone-level aggregation · Spatial context modeling · SIMD 7-domain OOF evaluation</text>

  <!-- Legend -->
  <g transform="translate(95,1110)">
    <rect x="0" y="0" width="26" height="16" rx="4" fill="#FCE5D6" stroke="#3B4351"/>
    <text x="34" y="13" class="tiny">Inputs / Fusion</text>
    <rect x="160" y="0" width="26" height="16" rx="4" fill="#DFEBF7" stroke="#3B4351"/>
    <text x="194" y="13" class="tiny">Dataset / Outputs</text>
    <rect x="340" y="0" width="26" height="16" rx="4" fill="#EDEEF7" stroke="#3B4351"/>
    <text x="374" y="13" class="tiny">Model / Encoding</text>
    <rect x="520" y="0" width="26" height="16" rx="4" fill="#E2EFD9" stroke="#3B4351"/>
    <text x="554" y="13" class="tiny">Aggregation</text>
    <rect x="680" y="0" width="26" height="16" rx="4" fill="#FFF2CC" stroke="#3B4351"/>
    <text x="714" y="13" class="tiny">SVF / Segmentation</text>
  </g>
</svg>
