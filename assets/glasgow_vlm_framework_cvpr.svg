<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="tinyShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5F6673"/>
    </marker>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#DFEBF7"/>
      <stop offset="50%" stop-color="#EDEEF7"/>
      <stop offset="100%" stop-color="#E2EFD9"/>
    </linearGradient>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 42px; font-weight: 760; fill: #1F2937; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 20px; font-weight: 500; fill: #5B6472; }
      .section { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 28px; font-weight: 750; fill: #243041; }
      .section-en { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 650; letter-spacing: 1.2px; fill: #667085; }
      .box-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 22px; font-weight: 720; fill: #243041; }
      .box-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #445064; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans CJK SC", "Microsoft YaHei", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #5C667A; }
      .tiny { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #6B7280; }
      .domain { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #243041; }
      .arrowLabel { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 650; fill: #667085; }
      .stroke { stroke: #CBD5E1; stroke-width: 1.4; }
      .dash { stroke: #94A3B8; stroke-width: 1.3; stroke-dasharray: 7 7; fill: none; }
      .arrow { stroke: #5F6673; stroke-width: 2.1; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .thinArrow { stroke: #5F6673; stroke-width: 1.7; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>
  <rect x="60" y="44" width="1800" height="992" rx="34" fill="#FFFFFF" stroke="#E6E9EF" stroke-width="1.5"/>

  <!-- Title -->
  <rect x="230" y="72" width="1460" height="86" rx="28" fill="url(#titleGrad)" opacity="0.52"/>
  <text x="960" y="122" text-anchor="middle" class="title">基于视觉-语言模型的格拉斯哥城市不平等分析</text>
  <text x="960" y="151" text-anchor="middle" class="subtitle">Vision-Language Model Framework for Glasgow Urban Inequality Analysis</text>

  <!-- Lane labels -->
  <text x="230" y="220" text-anchor="middle" class="section">原始数据输入</text>
  <text x="230" y="245" text-anchor="middle" class="section-en">RAW MULTI-SOURCE INPUTS</text>

  <text x="760" y="220" text-anchor="middle" class="section">感知层</text>
  <text x="760" y="245" text-anchor="middle" class="section-en">PERCEPTION LAYER</text>

  <text x="1190" y="220" text-anchor="middle" class="section">决策层</text>
  <text x="1190" y="245" text-anchor="middle" class="section-en">DECISION LAYER</text>

  <text x="1620" y="220" text-anchor="middle" class="section">SIMD 七领域预测</text>
  <text x="1620" y="245" text-anchor="middle" class="section-en">SEVEN-DOMAIN OUTPUTS</text>

  <!-- Column subtle panels -->
  <rect x="105" y="275" width="315" height="690" rx="30" fill="#F8FAFC" stroke="#E9EDF3"/>
  <rect x="540" y="275" width="440" height="690" rx="30" fill="#F8FAFC" stroke="#E9EDF3"/>
  <rect x="1040" y="275" width="300" height="690" rx="30" fill="#F8FAFC" stroke="#E9EDF3"/>
  <rect x="1450" y="275" width="365" height="690" rx="30" fill="#F8FAFC" stroke="#E9EDF3"/>

  <!-- Raw inputs boxes -->
  <g filter="url(#tinyShadow)">
    <rect x="140" y="310" width="245" height="70" rx="18" fill="#DFEBF7" class="stroke"/>
    <text x="262" y="342" text-anchor="middle" class="box-title">Datazone 边界</text>
    <text x="262" y="366" text-anchor="middle" class="small">Glasgow shapefile</text>

    <rect x="140" y="405" width="245" height="70" rx="18" fill="#FCE5D6" class="stroke"/>
    <text x="262" y="437" text-anchor="middle" class="box-title">卫星遥感图像</text>
    <text x="262" y="461" text-anchor="middle" class="small">Satellite patches</text>

    <rect x="140" y="500" width="245" height="70" rx="18" fill="#FFF2CC" class="stroke"/>
    <text x="262" y="532" text-anchor="middle" class="box-title">夜光图像</text>
    <text x="262" y="556" text-anchor="middle" class="small">Night-time light</text>

    <rect x="140" y="595" width="245" height="70" rx="18" fill="#E2EFD9" class="stroke"/>
    <text x="262" y="627" text-anchor="middle" class="box-title">街景图像</text>
    <text x="262" y="651" text-anchor="middle" class="small">Street-view images</text>

    <rect x="140" y="690" width="245" height="70" rx="18" fill="#EDEEF7" class="stroke"/>
    <text x="262" y="722" text-anchor="middle" class="box-title">POI 数据</text>
    <text x="262" y="746" text-anchor="middle" class="small">OSM / Places API</text>

    <rect x="140" y="785" width="245" height="70" rx="18" fill="#DFEBF7" class="stroke"/>
    <text x="262" y="817" text-anchor="middle" class="box-title">SIMD 2020 分数</text>
    <text x="262" y="841" text-anchor="middle" class="small">Training targets</text>
  </g>

  <!-- Perception big module -->
  <g filter="url(#softShadow)">
    <rect x="585" y="325" width="350" height="220" rx="30" fill="#EDEEF7" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="760" y="372" text-anchor="middle" class="box-title">Qwen3-VL 多模态感知</text>
    <text x="760" y="405" text-anchor="middle" class="box-text">从图像中生成结构化文本证据</text>
    <text x="760" y="438" text-anchor="middle" class="small">satellite · nightlight · street-view</text>
    <rect x="625" y="466" width="270" height="42" rx="14" fill="#FFFFFF" stroke="#D7DCE5"/>
    <text x="760" y="493" text-anchor="middle" class="small">evidence JSONL per datazone</text>
  </g>

  <!-- Evidence cards -->
  <g filter="url(#tinyShadow)">
    <rect x="590" y="600" width="160" height="110" rx="20" fill="#FCE5D6" stroke="#D5D9E1"/>
    <text x="670" y="637" text-anchor="middle" class="box-title">视觉语义</text>
    <text x="670" y="667" text-anchor="middle" class="small">urban texture</text>
    <text x="670" y="692" text-anchor="middle" class="small">built environment</text>

    <rect x="770" y="600" width="160" height="110" rx="20" fill="#E2EFD9" stroke="#D5D9E1"/>
    <text x="850" y="637" text-anchor="middle" class="box-title">空间线索</text>
    <text x="850" y="667" text-anchor="middle" class="small">greenery</text>
    <text x="850" y="692" text-anchor="middle" class="small">accessibility</text>

    <rect x="590" y="740" width="340" height="110" rx="20" fill="#DFEBF7" stroke="#D5D9E1"/>
    <text x="760" y="778" text-anchor="middle" class="box-title">多模态文本证据汇聚</text>
    <text x="760" y="811" text-anchor="middle" class="small">datazone-level textual representation</text>
  </g>

  <!-- Decision module steps -->
  <g filter="url(#tinyShadow)">
    <rect x="1075" y="320" width="230" height="82" rx="20" fill="#DFEBF7" stroke="#D5D9E1"/>
    <text x="1190" y="353" text-anchor="middle" class="box-title">SBERT 编码</text>
    <text x="1190" y="378" text-anchor="middle" class="small">text → embeddings</text>

    <rect x="1075" y="445" width="230" height="82" rx="20" fill="#FCE5D6" stroke="#D5D9E1"/>
    <text x="1190" y="478" text-anchor="middle" class="box-title">多模态特征融合</text>
    <text x="1190" y="503" text-anchor="middle" class="small">image · POI · evidence</text>

    <rect x="1075" y="570" width="230" height="82" rx="20" fill="#E2EFD9" stroke="#D5D9E1"/>
    <text x="1190" y="603" text-anchor="middle" class="box-title">空间特征</text>
    <text x="1190" y="628" text-anchor="middle" class="small">adjacency / spatial lag</text>

    <rect x="1075" y="695" width="230" height="82" rx="20" fill="#FFF2CC" stroke="#D5D9E1"/>
    <text x="1190" y="728" text-anchor="middle" class="box-title">RidgeCV 回归</text>
    <text x="1190" y="753" text-anchor="middle" class="small">7-domain prediction</text>
  </g>

  <!-- Output module -->
  <g filter="url(#softShadow)">
    <rect x="1495" y="330" width="275" height="535" rx="30" fill="#FFFFFF" stroke="#D4DAE5" stroke-width="1.5"/>
    <rect x="1525" y="365" width="215" height="42" rx="16" fill="#EDEEF7" stroke="#D5D9E1"/>
    <text x="1632" y="392" text-anchor="middle" class="box-title">SIMD Scores</text>

    <rect x="1525" y="440" width="215" height="42" rx="14" fill="#FCE5D6" stroke="#D5D9E1"/>
    <text x="1632" y="467" text-anchor="middle" class="domain">Income</text>
    <rect x="1525" y="495" width="215" height="42" rx="14" fill="#DFEBF7" stroke="#D5D9E1"/>
    <text x="1632" y="522" text-anchor="middle" class="domain">Employment</text>
    <rect x="1525" y="550" width="215" height="42" rx="14" fill="#E2EFD9" stroke="#D5D9E1"/>
    <text x="1632" y="577" text-anchor="middle" class="domain">Health</text>
    <rect x="1525" y="605" width="215" height="42" rx="14" fill="#FFF2CC" stroke="#D5D9E1"/>
    <text x="1632" y="632" text-anchor="middle" class="domain">Education</text>
    <rect x="1525" y="660" width="215" height="42" rx="14" fill="#EDEEF7" stroke="#D5D9E1"/>
    <text x="1632" y="687" text-anchor="middle" class="domain">Access</text>
    <rect x="1525" y="715" width="215" height="42" rx="14" fill="#FCE5D6" stroke="#D5D9E1"/>
    <text x="1632" y="742" text-anchor="middle" class="domain">Crime</text>
    <rect x="1525" y="770" width="215" height="42" rx="14" fill="#DFEBF7" stroke="#D5D9E1"/>
    <text x="1632" y="797" text-anchor="middle" class="domain">Housing</text>
  </g>

  <!-- Arrows main flow -->
  <path d="M 420 620 C 470 620, 500 435, 580 435" class="arrow"/>
  <text x="505" y="395" text-anchor="middle" class="arrowLabel">multimodal images</text>

  <path d="M 930 795 C 990 795, 1015 361, 1070 361" class="arrow"/>
  <path d="M 935 435 C 990 435, 1015 361, 1070 361" class="thinArrow"/>
  <text x="1010" y="322" text-anchor="middle" class="arrowLabel">text evidence</text>

  <path d="M 1305 736 C 1375 736, 1415 598, 1490 598" class="arrow"/>
  <text x="1410" y="560" text-anchor="middle" class="arrowLabel">predicted scores</text>

  <!-- Within-decision arrows -->
  <path d="M 1190 402 L 1190 439" class="thinArrow"/>
  <path d="M 1190 527 L 1190 564" class="thinArrow"/>
  <path d="M 1190 652 L 1190 689" class="thinArrow"/>

  <!-- Auxiliary arrows -->
  <path d="M 385 725 C 530 725, 980 486, 1070 486" class="thinArrow"/>
  <text x="753" y="572" text-anchor="middle" class="arrowLabel">POI structured features</text>

  <path d="M 385 820 C 650 925, 1080 890, 1190 782" class="thinArrow"/>
  <text x="760" y="913" text-anchor="middle" class="arrowLabel">SIMD 2020 labels for supervised learning</text>

  <path d="M 385 345 C 690 270, 1020 530, 1070 611" class="thinArrow"/>
  <text x="682" y="300" text-anchor="middle" class="arrowLabel">datazone topology</text>

  <!-- Footer notes -->
  <rect x="445" y="905" width="1030" height="58" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="960" y="930" text-anchor="middle" class="small">Pipeline: Raw inputs → VLM-based perception → representation learning & spatial modeling → SIMD seven-domain deprivation prediction</text>
  <text x="960" y="954" text-anchor="middle" class="tiny">CVPR / NeurIPS-style schematic · white background · rounded modules · soft shadows · editable SVG</text>
</svg>
